name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  unit-test-sh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3
      - run: bash tests/unit/db.test.sh
      - run: bash tests/unit/crash-recovery.test.sh
      - run: bash tests/unit/watchdog-reconciliation.test.sh
      - run: bash tests/unit/merge.test.sh
      - run: bash tests/unit/dev-worker.test.sh
      - run: bash tests/unit/task-fixer.test.sh
      - run: bash tests/unit/db-backup-restore.test.sh
      - run: bash tests/unit/auth-check.test.sh
      - run: bash tests/unit/redis-lock.test.sh

  lint-sh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Shellcheck all scripts/ .sh files (recursive)
        run: find scripts/ -name '*.sh' -print0 | xargs -0 shellcheck -S warning

  lint-ts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:ts

  build:
    needs: [typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e-cli:
    needs: [typecheck, unit-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure git identity for test commits
        run: |
          git config --global user.email "ci@ajioncorp.com"
          git config --global user.name "CI"
      - run: pnpm --filter @ajioncorp/skynet-cli build
      - run: bash tests/e2e/init-smoke.test.sh
      - run: bash tests/e2e/cli-commands.test.sh

  integration-test:
    needs: [typecheck, unit-test-sh]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3
      - name: Configure git identity
        run: |
          git config --global user.email "ci@ajioncorp.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main
      - run: bash tests/integration/pipeline-cycle.test.sh

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # devDependency transitive vulns (e.g. eslint tooling) can't be fixed here
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  e2e-admin:
    needs: [typecheck, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: pnpm --filter admin exec playwright install --with-deps chromium
      - run: pnpm test:e2e
